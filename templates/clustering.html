<!DOCTYPE html> 
<html><head><title>Parameter Clustering</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"></head> 
<body> 
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-6"> 
<div class="card"><div class="card-body text-center"> 
<h2>Parameter Clustering</h2> 
<form action="{{ url_for('run_clustering') }}" method="POST"> 
<label>Jumlah Cluster (K): <input type="range" name="n_clusters" min="2" max="8" value="3" oninput="this.nextElementSibling.value=this.value"> 
<output>3</output></label> 
<button type="submit" class="btn btn-primary mt-3">Jalankan Clustering</button> 
<a href="{{ url_for('index') }}" class="btn btn-secondary mt-3">Kembali</a> 
</form></div></div></div></div></div> 
</body></html>
